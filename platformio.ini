; ================================================================
; FilaTrack – PlatformIO Configuration
; ================================================================

[platformio]
default_envs = pandatouch

[env]
platform = espressif32@7.0.0
framework = arduino
board = esp32-s3-devkitc-1
monitor_speed = 115200
lib_deps =
  lvgl/lvgl@9.3.0
  tamctec/TAMC_GT911@1.0.2
  bblanchon/ArduinoJson@^7.0.0
build_flags =
  -I include
  -DLV_CONF_INCLUDE_SIMPLE
  -DBOARD_HAS_PSRAM
  -DARDUINO_LOOP_STACK_SIZE=16384


  
board_build.arduino.memory_type = qio_opi
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_upload.flash_size = 16MB



[env:pandatouch]
platform = espressif32@7.0.0
platform_packages =
  framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.0.7
  platformio/framework-arduinoespressif32-libs @ https://dl.espressif.com/AE/esp-arduino-libs/esp32-3.0.7.zip
  toolchain-xtensa-esp32s3 @ 12.2.0+20230208
  toolchain-riscv32-esp @ 12.2.0+20230208
board_build.partitions = partitions_custom.csv
build_flags =
  -I include
  -DLV_CONF_INCLUDE_SIMPLE
  -DBOARD_HAS_PSRAM
  -DARDUINO_LOOP_STACK_SIZE=16384
  -DMQTT_MAX_PACKET_SIZE=1024
lib_deps =
  lvgl/lvgl@9.3.0
  tamctec/TAMC_GT911@1.0.2
  bblanchon/ArduinoJson@^7.0.0
  moononournation/GFX Library for Arduino@1.6.1
  knolleary/PubSubClient@^2.8
  WiFi
  LittleFS
  ArduinoOTA
  https://github.com/me-no-dev/ESPAsyncWebServer.git
  https://github.com/me-no-dev/AsyncTCP.git
extra_scripts =
  pre:build_files_exclude.py
  pre:patch_gfx_getter.py
custom_build_files_exclude = */Arduino_ESP32LCD8.cpp */Arduino_ESP32QSPI.cpp
