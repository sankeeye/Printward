# Builds the FilaTrack Scale firmware (ESP32-S3) in CI.
#
# First step toward a one-click install: prove the scale firmware builds on GitHub's
# runners. Run it by hand from the Actions tab (Run workflow) and download the result
# under "Artifacts". Once this is green we add the merge → release → web flasher on top.
name: Build FilaTrack Scale firmware

on:
  workflow_dispatch:        # run manually from the Actions tab

jobs:
  scale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO + esptool
        # esptool <5: v5 renamed the merge_bin CLI, which ci_merge_scale.py uses.
        run: pip install --upgrade platformio "esptool<5"

      - name: Build scale firmware
        run: pio run -d scale -e filatrack_scale

      - name: Merge into one flash image
        run: python tools/ci_merge_scale.py scale/.pio/build/filatrack_scale filatrack-scale.bin

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: filatrack-scale-firmware
          path: filatrack-scale.bin
