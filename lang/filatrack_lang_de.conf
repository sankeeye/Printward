# Auf das Tablet kopieren:
#   adb push filatrack_lang_de.conf /sdcard/filatrack_lang_de.conf
# Danach erscheint Deutsch unter Einstellungen > Sprache - ohne Neubau.
#
# Format: eine Zeile key=Text, '#' beginnt einen Kommentar. Fehlende Schlüssel
# fallen auf Englisch zurück. Als Vorlage für weitere Sprachen geeignet.

