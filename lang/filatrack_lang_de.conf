# FilaTrack - Deutsch (example translation file)
#
# Copy this to the tablet and German appears in Settings - no rebuild, no
# toolchain, nothing to compile:
#
#     adb push filatrack_lang_de.conf /sdcard/filatrack_lang_de.conf
#
# Format: one key=text per line, '#' starts a comment. Any key you leave out
# falls back to English, so a half-finished translation is perfectly usable -
# just translate the lines you know and add more later.
#
# The same file feeds both the tablet and the web page, so each string is
# translated once. See lang/README.md for the full key list.

