; PandaScale - firmware for the (SpoolEase) load-cell scale hardware.
; ESP32-S3 + HX711. Reports the measured weight to the FilaTrack tablet over
; plain HTTP (GET /weight). Flash this INSTEAD of the SpoolEase firmware.
;
; Hardware (from the SpoolEase Scale build guide):
;   HX711 DT  -> GPIO5      HX711 SCK -> GPIO4
;   HX711 VCC -> 3V3        HX711 GND -> GND
;
; If your board is not a plain ESP32-S3-DevKitC, change `board` below - the
; GPIO numbers (4/5) stay the same regardless of the board silk.

[env:pandascale]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    bogde/HX711@^0.7.5
